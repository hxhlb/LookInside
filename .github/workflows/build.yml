name: Build Matrix

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: macos-26
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            slug: macos
            destination: generic/platform=macOS
            extra_args: ARCHS=arm64e ONLY_ACTIVE_ARCH=YES
          - name: iOS
            slug: ios
            destination: generic/platform=iOS
            extra_args: ""
          - name: iOS Simulator
            slug: ios-sim
            destination: generic/platform=iOS Simulator
            extra_args: ""
          - name: tvOS
            slug: tvos
            destination: generic/platform=tvOS
            extra_args: ""
          - name: tvOS Simulator
            slug: tvos-sim
            destination: generic/platform=tvOS Simulator
            extra_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Sync Derived Source
        run: bash Scripts/sync-derived-source.sh

      - name: Build SwiftPM Products
        if: matrix.slug == 'macos'
        run: |
          swift build -c debug --product lookinside
          swift build -c debug --product LookinServerDynamic
          swift build -c debug --product LookinServerInjected

      - name: Build LookinServerInjected
        run: |
          xcodebuild \
            -workspace LookInside.xcworkspace \
            -scheme LookinServerInjected \
            -configuration Debug \
            -destination "${{ matrix.destination }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData/${{ matrix.slug }}" \
            CODE_SIGNING_ALLOWED=NO \
            ${{ matrix.extra_args }} \
            build | xcbeautify
